<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actividad — HamLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0f;
    --surface: #111618;
    --surface2: #1a2022;
    --border: #2a3538;
    --accent: #00e5a0;
    --accent2: #00b8d4;
    --warn: #ff6b35;
    --text: #dde8ea;
    --text-dim: #6b8a90;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
    --condensed: 'Barlow Condensed', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,229,160,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,229,160,0.03) 40px);
    pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 10;
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 1.5rem;
  }
  .back-link {
    font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim);
    text-decoration: none; letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); }
  .header-title {
    font-family: var(--condensed); font-size: 1rem; font-weight: 700;
    color: var(--text-dim); letter-spacing: 0.05em;
  }

  .hero {
    position: relative; z-index: 1;
    height: 300px; overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  .hero-img {
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.4) grayscale(20%);
  }
  .hero-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 5rem; color: var(--border);
  }
  .hero-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: flex-end; padding: 2.5rem 2.5rem;
    background: linear-gradient(to top, rgba(10,14,15,0.95) 0%, transparent 60%);
  }
  .hero-tipo {
    font-family: var(--mono); font-size: 0.65rem; color: var(--accent);
    letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 0.5rem;
  }
  .hero-nombre {
    font-family: var(--condensed); font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900; line-height: 1; color: var(--text);
  }
  .hero-fecha {
    font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim);
    margin-top: 0.6rem;
  }
  .hero-desc {
    font-size: 0.9rem; color: var(--text-dim); margin-top: 0.5rem;
    max-width: 600px; line-height: 1.6;
  }

  main {
    position: relative; z-index: 1;
    max-width: 1300px; margin: 0 auto;
    padding: 3rem 2rem;
  }

  .section-label {
    font-family: var(--mono); font-size: 0.65rem; color: var(--accent);
    letter-spacing: 0.25em; text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 3rem;
  }
  .stat-box {
    background: var(--surface);
    padding: 1.5rem;
    text-align: center;
  }
  .stat-value {
    font-family: var(--condensed); font-size: 2.5rem; font-weight: 900;
    color: var(--accent); line-height: 1;
  }
  .stat-label {
    font-family: var(--mono); font-size: 0.62rem; color: var(--text-dim);
    letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.4rem;
  }

  /* Search */
  .search-bar {
    display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .search-input {
    flex: 1; min-width: 200px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 0.85rem;
    padding: 0.75rem 1rem; outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }

  /* Log table */
  .log-table-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse;
    font-family: var(--mono); font-size: 0.78rem;
  }
  thead th {
    background: var(--surface2); padding: 0.75rem 1rem;
    text-align: left; color: var(--accent);
    font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody td {
    padding: 0.7rem 1rem; color: var(--text-dim);
    white-space: nowrap;
  }
  tbody td:first-child { color: var(--text); font-weight: 600; }

  .btn-qsl {
    background: transparent; border: 1px solid var(--accent2);
    color: var(--accent2); font-family: var(--mono); font-size: 0.65rem;
    padding: 0.3rem 0.7rem; cursor: pointer; letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  .btn-qsl:hover { background: var(--accent2); color: var(--bg); }

  /* QSL Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,14,15,0.92); z-index: 100;
    align-items: center; justify-content: center;
    padding: 2rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    max-width: 700px; width: 100%;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header {
    padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title {
    font-family: var(--condensed); font-size: 1.2rem; font-weight: 700;
  }
  .modal-close {
    background: none; border: none; color: var(--text-dim);
    font-size: 1.2rem; cursor: pointer; padding: 0.2rem;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 1.5rem; }

  /* QSL Card canvas */
  #qsl-canvas {
    width: 100%; display: block;
    border: 1px solid var(--border);
    margin-bottom: 1rem;
  }
  .btn-download {
    width: 100%; padding: 0.9rem;
    background: var(--accent); color: var(--bg);
    border: none; font-family: var(--condensed); font-weight: 700;
    font-size: 1rem; letter-spacing: 0.1em; cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-download:hover { opacity: 0.85; }

  /* Loading */
  #loading {
    text-align: center; padding: 5rem 2rem;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim); }

  .no-results {
    font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim);
    text-align: center; padding: 3rem;
    border: 1px dashed var(--border);
  }

  footer {
    position: relative; z-index: 1;
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem; text-align: center;
    font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim);
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-link">← VOLVER</a>
  <span class="header-title" id="header-name">Cargando...</span>
</header>

<div class="hero" id="hero">
  <div class="hero-placeholder">📻</div>
  <div class="hero-overlay">
    <div class="hero-tipo" id="hero-tipo"></div>
    <div class="hero-nombre" id="hero-nombre">Cargando actividad...</div>
    <div class="hero-fecha" id="hero-fecha"></div>
    <div class="hero-desc" id="hero-desc"></div>
  </div>
</div>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <p>Cargando log...</p>
  </div>

  <div id="content" style="display:none">
    <div class="section-label">Estadísticas</div>
    <div class="stats-grid" id="stats-grid"></div>

    <div class="section-label">Log de contactos</div>
    <div class="search-bar">
      <input type="text" class="search-input" id="search-input"
        placeholder="Buscar por indicativo, banda, modo, país...">
    </div>
    <div class="log-table-wrap">
      <table id="log-table">
        <thead>
          <tr>
            <th>Indicativo</th>
            <th>Fecha</th>
            <th>Hora UTC</th>
            <th>Banda</th>
            <th>Modo</th>
            <th>RST TX</th>
            <th>RST RX</th>
            <th>País</th>
            <th>QSL</th>
          </tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
      <div id="no-results" class="no-results" style="display:none">No se encontraron contactos.</div>
    </div>
  </div>
</main>

<!-- QSL Modal -->
<div class="modal-overlay" id="qsl-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Tarjeta QSL</span>
      <button class="modal-close" onclick="closeQSL()">✕</button>
    </div>
    <div class="modal-body">
      <canvas id="qsl-canvas" width="1400" height="900"></canvas>
      <button class="btn-download" onclick="downloadQSL()">⬇ DESCARGAR QSL</button>
    </div>
  </div>
</div>

<footer>
  HamLog — <a href="index.html">Volver al inicio</a>
</footer>

<script>
const GITHUB_USER = 'ea7lhs';
const GITHUB_REPO = 'hamlog-activities';
const GITHUB_BRANCH = 'main';
const RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}`;

const params = new URLSearchParams(location.search);
const actFolder = params.get('a');
  const actPath = params.get('f') || 'actividades';

let allQSOs = [];
let actInfo = {};
let diplomaImg = null;

// ── ADIF Parser ──────────────────────────────────────────────────────────────
function parseADIF(txt) {
  const records = [];
  const blocks = txt.toUpperCase().split('<EOR>');
  for (const block of blocks) {
    const fields = {};
    const re = /<([A-Z_0-9]+)(?::\d+(?::[A-Z])?)?>([^<]*)/g;
    let m;
    while ((m = re.exec(block)) !== null) {
      fields[m[1].trim()] = m[2].trim();
    }
    if (fields.CALL) records.push(fields);
  }
  return records;
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function load() {
  if (!actFolder) { location.href = 'index.html'; return; }

  // Info
  try {
    const r = await fetch(`${RAW}/${actPath}/${actFolder}/info.json`);
    if (r.ok) {
      actInfo = await r.json();
      renderHero(actInfo);
    }
  } catch {}

  // Diploma image
  try {
    const dUrl = `${RAW}/${actPath}/${actFolder}/diploma.png`;
    diplomaImg = await loadImage(dUrl);
  } catch {}

  // Log
  try {
    const r = await fetch(`${RAW}/${actPath}/${actFolder}/log.adi`);
    if (r.ok) {
      const txt = await r.text();
      allQSOs = parseADIF(txt);
    }
  } catch {}

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  renderStats();
  renderTable(allQSOs);

  document.getElementById('search-input').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    const filtered = q
      ? allQSOs.filter(qso =>
          [qso.CALL, qso.BAND, qso.MODE, qso.COUNTRY, qso.NAME]
            .some(v => v && v.toLowerCase().includes(q))
        )
      : allQSOs;
    renderTable(filtered);
  });
}

function renderHero(info) {
  document.title = info.nombre + ' — HamLog';
  document.getElementById('header-name').textContent = info.nombre || '';
  document.getElementById('hero-nombre').textContent = info.nombre || '';
  document.getElementById('hero-tipo').textContent = info.tipo || '';
  document.getElementById('hero-desc').textContent = info.descripcion || '';

  if (info.fecha) {
    const d = new Date(info.fecha);
    document.getElementById('hero-fecha').textContent =
      d.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  }

  if (info.foto) {
    const hero = document.getElementById('hero');
    hero.innerHTML = `
      <img class="hero-img" src="${RAW}/actividades/${actFolder}/${info.foto}" alt="${info.nombre}">
      <div class="hero-overlay">
        <div class="hero-tipo">${info.tipo || ''}</div>
        <div class="hero-nombre">${info.nombre || ''}</div>
        <div class="hero-fecha" id="hero-fecha"></div>
        <div class="hero-desc">${info.descripcion || ''}</div>
      </div>`;
    if (info.fecha) {
      const d = new Date(info.fecha);
      hero.querySelector('#hero-fecha').textContent =
        d.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    }
  }
}

function renderStats() {
  const qsos = allQSOs;
  const bands = [...new Set(qsos.map(q => q.BAND).filter(Boolean))];
  const modes = [...new Set(qsos.map(q => q.MODE).filter(Boolean))];
  const countries = [...new Set(qsos.map(q => q.COUNTRY || q.DXCC).filter(Boolean))];

  const stats = [
    { value: qsos.length, label: 'Total QSOs' },
    { value: bands.length, label: 'Bandas' },
    { value: modes.length, label: 'Modos' },
    { value: countries.length, label: 'Países / DXCC' },
  ];

  document.getElementById('stats-grid').innerHTML = stats
    .map(s => `<div class="stat-box"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`)
    .join('');
}

function renderTable(qsos) {
  const tbody = document.getElementById('log-tbody');
  const noRes = document.getElementById('no-results');

  if (qsos.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  tbody.innerHTML = qsos.map(q => {
    const date = formatDate(q.QSO_DATE);
    const time = formatTime(q.TIME_ON);
    return `<tr>
      <td>${q.CALL || ''}</td>
      <td>${date}</td>
      <td>${time}</td>
      <td>${q.BAND || ''}</td>
      <td>${q.MODE || ''}</td>
      <td>${q.RST_SENT || ''}</td>
      <td>${q.RST_RCVD || ''}</td>
      <td>${q.COUNTRY || q.DXCC || ''}</td>
      <td><button class="btn-qsl" onclick="openQSL(${JSON.stringify(q).replace(/"/g,'&quot;')})">QSL</button></td>
    </tr>`;
  }).join('');
}

function formatDate(d) {
  if (!d || d.length < 8) return d || '';
  return `${d.slice(6,8)}/${d.slice(4,6)}/${d.slice(0,4)}`;
}
function formatTime(t) {
  if (!t || t.length < 4) return t || '';
  return `${t.slice(0,2)}:${t.slice(2,4)}`;
}

// ── QSL Card ─────────────────────────────────────────────────────────────────
let currentQSO = null;

function openQSL(qso) {
  currentQSO = qso;
  document.getElementById('qsl-modal').classList.add('open');
  drawQSL(qso);
}
function closeQSL() {
  document.getElementById('qsl-modal').classList.remove('open');
}

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

function drawQSL(qso) {
  const canvas = document.getElementById('qsl-canvas');
  const ctx = canvas.getContext('2d');
  const W = 1400, H = 900;
  canvas.width = W; canvas.height = H;

  // Background
  if (diplomaImg) {
    ctx.drawImage(diplomaImg, 0, 0, W, H);
    ctx.fillStyle = 'rgba(10,14,15,0.72)';
    ctx.fillRect(0, 0, W, H);
  } else {
    // Gradient fallback
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#0a0e0f');
    grad.addColorStop(1, '#0f1e20');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(0,229,160,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  // Top accent bar
  ctx.fillStyle = '#00e5a0';
  ctx.fillRect(0, 0, W, 6);

  // "CONFIRMING QSO" label
  ctx.font = '600 22px "Share Tech Mono", monospace';
  ctx.fillStyle = '#00e5a0';
  ctx.letterSpacing = '0.3em';
  ctx.fillText('CONFIRMING QSO WITH', 80, 80);

  // Callsign
  ctx.font = 'bold 130px "Barlow Condensed", sans-serif';
  ctx.fillStyle = '#dde8ea';
  ctx.fillText(qso.CALL || '?', 80, 200);

  // Activity name
  ctx.font = '700 36px "Barlow Condensed", sans-serif';
  ctx.fillStyle = '#00b8d4';
  ctx.fillText((actInfo.nombre || '').toUpperCase(), 80, 255);

  // Divider
  ctx.strokeStyle = '#2a3538';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(80, 290); ctx.lineTo(W - 80, 290); ctx.stroke();

  // QSO Details grid
  const details = [
    ['FECHA',    formatDate(qso.QSO_DATE)],
    ['HORA UTC', formatTime(qso.TIME_ON)],
    ['BANDA',    qso.BAND || ''],
    ['MODO',     qso.MODE || ''],
    ['RST TX',   qso.RST_SENT || ''],
    ['RST RX',   qso.RST_RCVD || ''],
  ].filter(d => d[1]);

  const colW = (W - 160) / 3;
  details.forEach(([label, value], i) => {
    const col = i % 3;
    const row = Math.floor(i / 3);
    const x = 80 + col * colW;
    const y = 360 + row * 120;

    ctx.font = '600 18px "Share Tech Mono", monospace';
    ctx.fillStyle = '#00e5a0';
    ctx.fillText(label, x, y);

    ctx.font = 'bold 52px "Barlow Condensed", sans-serif';
    ctx.fillStyle = '#dde8ea';
    ctx.fillText(value, x, y + 55);
  });

  // Station callsign bottom right
  const stationCall = actInfo.indicativo || '';
  if (stationCall) {
    ctx.font = 'bold 90px "Barlow Condensed", sans-serif';
    ctx.fillStyle = 'rgba(0,229,160,0.15)';
    ctx.textAlign = 'right';
    ctx.fillText(stationCall, W - 80, H - 40);
    ctx.textAlign = 'left';

    ctx.font = '600 20px "Share Tech Mono", monospace';
    ctx.fillStyle = '#6b8a90';
    ctx.textAlign = 'right';
    ctx.fillText('DE', W - 80 - ctx.measureText(stationCall).width * 0.9 - 10, H - 40);
    ctx.textAlign = 'left';
  }

  // Bottom accent
  ctx.fillStyle = '#00e5a0';
  ctx.fillRect(0, H - 4, W, 4);
}

function downloadQSL() {
  if (!currentQSO) return;
  const canvas = document.getElementById('qsl-canvas');
  const link = document.createElement('a');
  link.download = `QSL_${currentQSO.CALL || 'qso'}_${currentQSO.QSO_DATE || ''}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Close modal on overlay click
document.getElementById('qsl-modal').addEventListener('click', function(e) {
  if (e.target === this) closeQSL();
});

load();
</script>
</body>
</html>
