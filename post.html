<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HamLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root{--bg:#0a0e0f;--surface:#111618;--surface2:#1a2022;--border:#2a3538;--accent:#00e5a0;--accent2:#00b8d4;--text:#dde8ea;--text-dim:#6b8a90;--mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;--cond:'Barlow Condensed',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,229,160,.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,229,160,.03) 40px);}
  header{position:relative;z-index:10;padding:1.2rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1.2rem}
  .back-link{font-family:var(--mono);font-size:.72rem;color:var(--text-dim);text-decoration:none;letter-spacing:.1em;transition:color .2s}
  .back-link:hover{color:var(--accent)}
  .hero{position:relative;z-index:1;height:280px;overflow:hidden;border-bottom:1px solid var(--border)}
  .hero-img{width:100%;height:100%;object-fit:cover;filter:brightness(.4)}
  .hero-placeholder{width:100%;height:100%;background:linear-gradient(135deg,var(--surface),var(--surface2));display:flex;align-items:center;justify-content:center;font-size:4rem;color:var(--border)}
  .hero-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:2rem 2.5rem;background:linear-gradient(to top,rgba(10,14,15,.95) 0%,transparent 60%)}
  .hero-badge{font-family:var(--mono);font-size:.6rem;color:var(--accent2);letter-spacing:.2em;margin-bottom:.4rem}
  .hero-title{font-family:var(--cond);font-size:clamp(1.8rem,4vw,3rem);font-weight:900;line-height:1.1}
  .hero-date{font-family:var(--mono);font-size:.7rem;color:var(--text-dim);margin-top:.5rem}
  main{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:3rem 2rem}
  .prose{font-size:1rem;line-height:1.8;color:var(--text)}
  .prose h1,.prose h2{font-family:var(--cond);font-weight:700;margin:1.5rem 0 .6rem;line-height:1.2}
  .prose h2{font-size:1.6rem;color:var(--accent2)}
  .prose h3{font-family:var(--cond);font-size:1.2rem;font-weight:700;margin:1.2rem 0 .4rem;color:var(--text)}
  .prose p{margin-bottom:1rem}
  .prose a{color:var(--accent);text-decoration:none}
  .prose a:hover{text-decoration:underline}
  .prose blockquote{border-left:3px solid var(--accent);padding-left:1.2rem;color:var(--text-dim);margin:1rem 0;font-style:italic}
  .prose ul,.prose ol{padding-left:1.5rem;margin-bottom:1rem}
  .prose li{margin-bottom:.3rem}
  .prose strong{color:var(--text);font-weight:700}
  .prose hr{border:none;border-top:1px solid var(--border);margin:2rem 0}
  footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:1.5rem 2rem;text-align:center;font-family:var(--mono);font-size:.63rem;color:var(--text-dim)}
  footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back-link">← VOLVER</a>
</header>
<div class="hero" id="hero">
  <div class="hero-placeholder">📝</div>
  <div class="hero-overlay">
    <div class="hero-badge">NOTICIA</div>
    <div class="hero-title" id="hero-title">Cargando...</div>
    <div class="hero-date" id="hero-date"></div>
  </div>
</div>
<main>
  <div class="prose" id="prose"></div>
</main>
<footer>HamLog — <a href="index.html">Volver al inicio</a></footer>
<script>
const GITHUB_USER='ea7lhs',GITHUB_REPO='hamlog-activities',GITHUB_BRANCH='main';
const RAW=`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}`;
const p=new URLSearchParams(location.search);
const folder=p.get('f'),name=p.get('a');

async function load(){
  try{
    const r=await fetch(`${RAW}/${folder}/${name}/info.json`);
    if(!r.ok)return;
    const info=await r.json();
    document.title=(info.titulo||info.nombre)+' — HamLog';
    document.getElementById('hero-title').textContent=info.titulo||info.nombre||'';
    if(info.fecha) document.getElementById('hero-date').textContent=new Date(info.fecha).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    if(info.foto){
      const h=document.getElementById('hero');
      h.innerHTML=`<img class="hero-img" src="${RAW}/${folder}/${name}/${info.foto}" alt=""><div class="hero-overlay"><div class="hero-badge">NOTICIA</div><div class="hero-title">${info.titulo||info.nombre||''}</div><div class="hero-date">${document.getElementById?'':''}</div></div>`;
    }
    const prose=document.getElementById('prose');
    if(info.contenido){
      prose.innerHTML=marked.parse(info.contenido);
    } else if(info.descripcion){
      prose.innerHTML=`<p>${info.descripcion}</p>`;
    }
  }catch(e){console.error(e)}
}
load();
</script>
</body>
</html>
