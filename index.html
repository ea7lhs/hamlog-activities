<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HamLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e0f; --surface:#111618; --surface2:#1a2022;
    --border:#2a3538; --accent:#00e5a0; --accent2:#00b8d4;
    --warn:#ff9800; --event:#a78bfa; --gallery:#f472b6;
    --text:#dde8ea; --text-dim:#6b8a90;
    --mono:'Share Tech Mono',monospace;
    --sans:'Barlow',sans-serif;
    --cond:'Barlow Condensed',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,229,160,.03) 40px),
      repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,229,160,.03) 40px);
  }

  header{
    position:relative;z-index:10;
    padding:2rem 2rem 1.5rem;
    border-bottom:1px solid var(--border);
    display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;
  }
  .logo-tag{font-family:var(--mono);font-size:.65rem;color:var(--accent);letter-spacing:.2em;margin-bottom:.4rem}
  .logo-title{font-family:var(--cond);font-size:clamp(2rem,5vw,3.2rem);font-weight:900;line-height:1}
  .logo-title span{color:var(--accent)}
  .logo-sub{font-family:var(--mono);font-size:.7rem;color:var(--text-dim);margin-top:.4rem;letter-spacing:.08em}
  .header-right{text-align:right}
  #site-callsign{font-family:var(--cond);font-size:clamp(1.6rem,4vw,2.5rem);font-weight:700;color:var(--accent2)}
  .admin-link{
    display:inline-flex;align-items:center;gap:.4rem;margin-top:.4rem;
    font-family:var(--mono);font-size:.68rem;color:var(--text-dim);
    text-decoration:none;border:1px solid var(--border);padding:.35rem .8rem;
    letter-spacing:.1em;transition:all .2s;
  }
  .admin-link:hover{color:var(--accent);border-color:var(--accent)}

  main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:3rem 2rem}

  /* Filters */
  .filters{display:flex;gap:.5rem;margin-bottom:2.5rem;flex-wrap:wrap}
  .filter-btn{
    font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;
    padding:.4rem 1rem;border:1px solid var(--border);background:none;
    color:var(--text-dim);cursor:pointer;transition:all .2s;
  }
  .filter-btn:hover,.filter-btn.active{color:var(--bg);background:var(--accent);border-color:var(--accent)}
  .filter-btn[data-type="log"].active{background:var(--accent);border-color:var(--accent)}
  .filter-btn[data-type="post"].active{background:var(--accent2);border-color:var(--accent2)}
  .filter-btn[data-type="evento"].active{background:var(--event);border-color:var(--event)}
  .filter-btn[data-type="galeria"].active{background:var(--gallery);border-color:var(--gallery)}

  /* Grid */
  #content-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:1.5rem;
  }

  /* Cards */
  .card{
    background:var(--surface);border:1px solid var(--border);
    overflow:hidden;cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s;
    text-decoration:none;color:inherit;display:block;
    animation:fadeUp .4s ease both;
  }
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,229,160,.08)}
  .card[data-type="log"]:hover{border-color:var(--accent)}
  .card[data-type="post"]:hover{border-color:var(--accent2)}
  .card[data-type="evento"]:hover{border-color:var(--event)}
  .card[data-type="galeria"]:hover{border-color:var(--gallery)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  .card-img{width:100%;height:180px;object-fit:cover;display:block;filter:brightness(.85);transition:filter .3s;background:var(--surface2)}
  .card:hover .card-img{filter:brightness(1)}
  .card-img-placeholder{
    width:100%;height:140px;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--border);
  }

  .card-body{padding:1.1rem 1.3rem 1.3rem}
  .card-type-badge{
    display:inline-block;font-family:var(--mono);font-size:.58rem;
    letter-spacing:.18em;text-transform:uppercase;
    padding:.2rem .6rem;margin-bottom:.6rem;
  }
  .badge-log{background:rgba(0,229,160,.1);color:var(--accent);border:1px solid rgba(0,229,160,.2)}
  .badge-post{background:rgba(0,184,212,.1);color:var(--accent2);border:1px solid rgba(0,184,212,.2)}
  .badge-evento{background:rgba(167,139,250,.1);color:var(--event);border:1px solid rgba(167,139,250,.2)}
  .badge-galeria{background:rgba(244,114,182,.1);color:var(--gallery);border:1px solid rgba(244,114,182,.2)}

  .card-title{font-family:var(--cond);font-size:1.3rem;font-weight:700;line-height:1.2;margin-bottom:.5rem}
  .card-excerpt{font-size:.85rem;color:var(--text-dim);line-height:1.6;margin-bottom:.6rem;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-date{font-family:var(--mono);font-size:.68rem;color:var(--text-dim)}

  .card-footer{
    padding:.7rem 1.3rem;border-top:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .card-meta{font-family:var(--mono);font-size:.68rem;color:var(--text-dim)}
  .card-meta strong{color:var(--accent2)}
  .card-arrow{font-family:var(--mono);font-size:.7rem;color:var(--accent)}

  /* Upcoming event highlight */
  .card.upcoming{border-color:rgba(167,139,250,.3)}
  .upcoming-badge{
    font-family:var(--mono);font-size:.58rem;color:var(--event);
    letter-spacing:.15em;margin-bottom:.3rem;
  }

  /* Loading / empty */
  #loading{text-align:center;padding:5rem 2rem}
  .spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.2rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading p{font-family:var(--mono);font-size:.78rem;color:var(--text-dim)}
  #empty{display:none;text-align:center;padding:4rem 2rem;border:1px dashed var(--border)}
  #empty h2{font-family:var(--cond);font-size:1.6rem;color:var(--text-dim);margin-bottom:.5rem}
  #empty p{font-family:var(--mono);font-size:.75rem;color:var(--text-dim);line-height:1.8}
  #empty a{color:var(--accent);text-decoration:none}

  footer{
    position:relative;z-index:1;border-top:1px solid var(--border);
    padding:1.5rem 2rem;text-align:center;
    font-family:var(--mono);font-size:.63rem;color:var(--text-dim);
  }
  footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo-tag">&#9679; Amateur Radio Log</div>
    <div class="logo-title" id="site-titulo">Ham<span>Log</span></div>
    <div class="logo-sub" id="site-subtitulo">Actividades y noticias de radioafición</div>
  </div>
  <div class="header-right">
    <div id="site-callsign"></div>
    <a href="admin.html" class="admin-link">&#9881; Admin</a>
  </div>
</header>

<main>
  <div class="filters">
    <button class="filter-btn active" data-type="all">TODOS</button>
    <button class="filter-btn" data-type="log">📡 LOGS</button>
    <button class="filter-btn" data-type="post">📝 NOTICIAS</button>
    <button class="filter-btn" data-type="evento">📅 EVENTOS</button>
    <button class="filter-btn" data-type="galeria">🖼️ GALERÍAS</button>
  </div>

  <div id="loading"><div class="spinner"></div><p>Cargando...</p></div>
  <div id="content-grid" style="display:none"></div>
  <div id="empty">
    <h2>Sin publicaciones</h2>
    <p>Aún no hay contenido.<br><a href="admin.html">Ir al panel de administración</a></p>
  </div>
</main>

<footer>HamLog — <a href="https://github.com/ea7lhs/hamlog-activities" target="_blank">Código abierto</a></footer>

<script>
const GITHUB_USER   = 'ea7lhs';
const GITHUB_REPO   = 'hamlog-activities';
const GITHUB_BRANCH = 'main';
const RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}`;
const API = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;

let allItems = [];
let activeFilter = 'all';

async function init() {
  // Site config
  try {
    const r = await fetch(`${RAW}/hamlog.config.json`);
    if (r.ok) {
      const cfg = await r.json();
      if (cfg.callsign) document.getElementById('site-callsign').textContent = cfg.callsign;
      if (cfg.titulo)   document.getElementById('site-titulo').innerHTML = cfg.titulo.replace(/Ham/,'Ham<span>') + '</span>';
      if (cfg.subtitulo) document.getElementById('site-subtitulo').textContent = cfg.subtitulo;
      if (cfg.titulo)   document.title = cfg.titulo;
    }
  } catch {}

  await loadAll();

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.type;
      renderGrid();
    });
  });
}

async function loadAll() {
  const types = ['actividades','posts','eventos','galerias'];
  const results = await Promise.all(types.map(loadFolder));
  allItems = results.flat().filter(Boolean);
  allItems.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
  document.getElementById('loading').style.display = 'none';
  if (!allItems.length) { document.getElementById('empty').style.display = 'block'; return; }
  renderGrid();
}

async function loadFolder(folder) {
  try {
    const r = await fetch(`${API}/${folder}`, { headers:{Accept:'application/vnd.github.v3+json'} });
    if (!r.ok) return [];
    const dirs = (await r.json()).filter(i => i.type === 'dir');
    return Promise.all(dirs.map(d => loadItem(folder, d.name)));
  } catch { return []; }
}

async function loadItem(folder, name) {
  try {
    const r = await fetch(`${RAW}/${folder}/${name}/info.json`);
    if (!r.ok) return null;
    const info = await r.json();
    info._folder = name;
    info._type   = folder.replace(/s$/,''); // actividades→actividad, posts→post etc
    info._path   = folder;

    // Count QSOs for logs
    if (info._type === 'actividad') {
      try {
        const lr = await fetch(`${RAW}/${folder}/${name}/log.adi`);
        if (lr.ok) {
          const txt = await lr.text();
          info._qsos = (txt.match(/<EOR>/gi)||[]).length;
        }
      } catch {}
    }
    return info;
  } catch { return null; }
}

function renderGrid() {
  const grid = document.getElementById('content-grid');
  const filtered = activeFilter === 'all'
    ? allItems
    : allItems.filter(i => {
        if (activeFilter === 'log')     return i._type === 'actividad';
        if (activeFilter === 'post')    return i._type === 'post';
        if (activeFilter === 'evento')  return i._type === 'evento';
        if (activeFilter === 'galeria') return i._type === 'galeria';
      });

  if (!filtered.length) {
    grid.style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('empty').style.display = 'none';
  grid.style.display = 'grid';
  grid.innerHTML = '';

  filtered.forEach((item, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.dataset.type = typeToFilter(item._type);
    card.style.animationDelay = `${i * 0.05}s`;
    card.href = pageFor(item);

    const fotoUrl = item.foto ? `${RAW}/${item._path}/${item._folder}/${item.foto}` : null;
    const imgHtml = fotoUrl
      ? `<img class="card-img" src="${fotoUrl}" alt="" loading="lazy" onerror="this.outerHTML='<div class=card-img-placeholder>${iconFor(item._type)}</div>'">`
      : `<div class="card-img-placeholder">${iconFor(item._type)}</div>`;

    const fecha = fmtDate(item.fecha);
    const badge = badgeHtml(item._type);
    const isUpcoming = item._type === 'evento' && new Date(item.fecha) > new Date();

    if (isUpcoming) card.classList.add('upcoming');

    const upcomingBadge = isUpcoming
      ? `<div class="upcoming-badge">⚡ PRÓXIMAMENTE · ${diasRestantes(item.fecha)}</div>`
      : '';

    const excerpt = item.descripcion
      ? `<div class="card-excerpt">${item.descripcion}</div>` : '';

    const footer = cardFooter(item);

    card.innerHTML = `
      ${imgHtml}
      <div class="card-body">
        ${badge}
        ${upcomingBadge}
        <div class="card-title">${item.nombre||item.titulo||'Sin título'}</div>
        ${excerpt}
        <div class="card-date">${fecha}</div>
      </div>
      ${footer}`;
    grid.appendChild(card);
  });
}

function typeToFilter(t) {
  return {actividad:'log', post:'post', evento:'evento', galeria:'galeria'}[t] || t;
}
function iconFor(t) {
  return {actividad:'📡', post:'📝', evento:'📅', galeria:'🖼️'}[t] || '📄';
}
function pageFor(item) {
  const pages = {actividad:'actividad.html', post:'post.html', evento:'evento.html', galeria:'galeria.html'};
  return `${pages[item._type]||'actividad.html'}?f=${encodeURIComponent(item._path)}&a=${encodeURIComponent(item._folder)}`;
}
function badgeHtml(t) {
  const map = {actividad:['badge-log','LOG'], post:['badge-post','NOTICIA'], evento:['badge-evento','EVENTO'], galeria:['badge-galeria','GALERÍA']};
  const [cls, label] = map[t]||['badge-post','POST'];
  return `<span class="card-type-badge ${cls}">${label}</span>`;
}
function cardFooter(item) {
  if (item._type === 'actividad') {
    return `<div class="card-footer">
      <div class="card-meta">${item._qsos !== undefined ? `<strong>${item._qsos}</strong> QSOs` : ''}</div>
      <div class="card-arrow">VER LOG →</div>
    </div>`;
  }
  if (item._type === 'galeria' && item.fotos) {
    return `<div class="card-footer">
      <div class="card-meta"><strong>${item.fotos.length}</strong> fotos</div>
      <div class="card-arrow">VER →</div>
    </div>`;
  }
  return `<div class="card-footer"><div></div><div class="card-arrow">LEER →</div></div>`;
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
}
function diasRestantes(d) {
  const diff = Math.ceil((new Date(d)-new Date())/(1000*60*60*24));
  return diff === 1 ? 'mañana' : `en ${diff} días`;
}

init();
</script>
</body>
</html>
