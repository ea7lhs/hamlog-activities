<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HamLog — Evento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root{--bg:#0a0e0f;--surface:#111618;--surface2:#1a2022;--border:#2a3538;--accent:#00e5a0;--accent2:#00b8d4;--event:#a78bfa;--text:#dde8ea;--text-dim:#6b8a90;--mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;--cond:'Barlow Condensed',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(167,139,250,.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(167,139,250,.03) 40px);}
  header{position:relative;z-index:10;padding:1.2rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1.2rem}
  .back-link{font-family:var(--mono);font-size:.72rem;color:var(--text-dim);text-decoration:none;letter-spacing:.1em;transition:color .2s}
  .back-link:hover{color:var(--accent)}
  .hero{position:relative;z-index:1;height:260px;overflow:hidden;border-bottom:1px solid var(--border)}
  .hero-img{width:100%;height:100%;object-fit:cover;filter:brightness(.35)}
  .hero-placeholder{width:100%;height:100%;background:linear-gradient(135deg,#1a1230,#0d1a20);display:flex;align-items:center;justify-content:center;font-size:4rem;color:var(--border)}
  .hero-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:2rem 2.5rem;background:linear-gradient(to top,rgba(10,14,15,.95) 0%,transparent 60%)}
  .hero-badge{font-family:var(--mono);font-size:.6rem;color:var(--event);letter-spacing:.2em;margin-bottom:.4rem}
  .hero-title{font-family:var(--cond);font-size:clamp(1.8rem,4vw,3rem);font-weight:900;line-height:1.1}
  main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:3rem 2rem}

  /* Countdown */
  #countdown-wrap{margin-bottom:2.5rem}
  .countdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);max-width:400px}
  .cd-box{background:var(--surface);padding:1.2rem;text-align:center}
  .cd-value{font-family:var(--cond);font-size:2.2rem;font-weight:900;color:var(--event);line-height:1}
  .cd-label{font-family:var(--mono);font-size:.58rem;color:var(--text-dim);letter-spacing:.15em;margin-top:.3rem}
  .past-badge{font-family:var(--mono);font-size:.75rem;color:var(--text-dim);padding:.6rem 1rem;border:1px solid var(--border);display:inline-block}

  /* Info boxes */
  .info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:2.5rem}
  .info-box{background:var(--surface);border:1px solid var(--border);padding:1.2rem}
  .info-box-label{font-family:var(--mono);font-size:.6rem;color:var(--event);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.4rem}
  .info-box-value{font-family:var(--cond);font-size:1.2rem;font-weight:700}

  .section-label{font-family:var(--mono);font-size:.63rem;color:var(--event);letter-spacing:.25em;text-transform:uppercase;margin-bottom:1.2rem;display:flex;align-items:center;gap:.8rem}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .prose{font-size:1rem;line-height:1.8;color:var(--text)}
  .prose h2{font-family:var(--cond);font-weight:700;font-size:1.5rem;margin:1.5rem 0 .5rem;color:var(--event)}
  .prose p{margin-bottom:1rem}
  .prose a{color:var(--accent);text-decoration:none}
  .prose ul{padding-left:1.5rem;margin-bottom:1rem}
  .prose strong{color:var(--text);font-weight:700}
  footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:1.5rem 2rem;text-align:center;font-family:var(--mono);font-size:.63rem;color:var(--text-dim)}
  footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<header><a href="index.html" class="back-link">← VOLVER</a></header>
<div class="hero" id="hero">
  <div class="hero-placeholder">📅</div>
  <div class="hero-overlay">
    <div class="hero-badge">EVENTO</div>
    <div class="hero-title" id="hero-title">Cargando...</div>
  </div>
</div>
<main>
  <div id="countdown-wrap"></div>
  <div class="info-grid" id="info-grid"></div>
  <div id="content-wrap"></div>
</main>
<footer>HamLog — <a href="index.html">Volver al inicio</a></footer>
<script>
const GITHUB_USER='ea7lhs',GITHUB_REPO='hamlog-activities',GITHUB_BRANCH='main';
const RAW=`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}`;
const p=new URLSearchParams(location.search);
const folder=p.get('f'),name=p.get('a');

async function load(){
  const r=await fetch(`${RAW}/${folder}/${name}/info.json`);
  if(!r.ok)return;
  const info=await r.json();
  document.title=(info.titulo||info.nombre)+' — HamLog';
  document.getElementById('hero-title').textContent=info.titulo||info.nombre||'';
  if(info.foto){
    const h=document.getElementById('hero');
    h.innerHTML=`<img class="hero-img" src="${RAW}/${folder}/${name}/${info.foto}" alt=""><div class="hero-overlay"><div class="hero-badge">EVENTO</div><div class="hero-title">${info.titulo||info.nombre||''}</div></div>`;
  }

  // Countdown
  const cdWrap=document.getElementById('countdown-wrap');
  const now=new Date(), eventDate=new Date(info.fecha);
  const diff=eventDate-now;
  if(diff>0){
    const days=Math.floor(diff/864e5),hours=Math.floor((diff%864e5)/36e5),mins=Math.floor((diff%36e5)/6e4),secs=Math.floor((diff%6e4)/1e3);
    cdWrap.innerHTML=`<div class="section-label">Faltan</div><div class="countdown-grid">
      <div class="cd-box"><div class="cd-value" id="cd-d">${days}</div><div class="cd-label">DÍAS</div></div>
      <div class="cd-box"><div class="cd-value" id="cd-h">${hours}</div><div class="cd-label">HORAS</div></div>
      <div class="cd-box"><div class="cd-value" id="cd-m">${mins}</div><div class="cd-label">MIN</div></div>
      <div class="cd-box"><div class="cd-value" id="cd-s">${secs}</div><div class="cd-label">SEG</div></div>
    </div>`;
    setInterval(()=>{
      const d2=new Date(info.fecha)-new Date(),dd=Math.floor(d2/864e5),dh=Math.floor((d2%864e5)/36e5),dm=Math.floor((d2%36e5)/6e4),ds=Math.floor((d2%6e4)/1e3);
      if(d2>0){document.getElementById('cd-d').textContent=dd;document.getElementById('cd-h').textContent=dh;document.getElementById('cd-m').textContent=dm;document.getElementById('cd-s').textContent=ds;}
    },1000);
  } else {
    cdWrap.innerHTML=`<span class="past-badge">Este evento ya ha tenido lugar</span>`;
  }

  // Info boxes
  const boxes=[];
  if(info.fecha) boxes.push({label:'Fecha',value:new Date(info.fecha).toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'})});
  if(info.fechaFin) boxes.push({label:'Hasta',value:new Date(info.fechaFin).toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'})});
  if(info.lugar) boxes.push({label:'Lugar',value:info.lugar});
  document.getElementById('info-grid').innerHTML=boxes.map(b=>`<div class="info-box"><div class="info-box-label">${b.label}</div><div class="info-box-value">${b.value}</div></div>`).join('');

  // Content
  if(info.contenido||info.descripcion){
    const w=document.getElementById('content-wrap');
    w.innerHTML=`<div class="section-label">Detalles</div><div class="prose">${marked.parse(info.contenido||info.descripcion)}</div>`;
  }
}
load();
</script>
</body>
</html>
